site_name: mol-tdn
site_description: Explainable cubic equations of state for molecular-fluid research
site_url: https://danieleongari.github.io/mol-tdn/
repo_url: https://github.com/danieleongari/mol-tdn
repo_name: danieleongari/mol-tdn

theme:
  name: material
  features:
    - content.code.copy
    - navigation.footer
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Use dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Use light mode

nav:
  - Home: index.md
  - Manifesto: manifesto.md
  - Guide:
      - Quick start: quickstart.md
      - Explainable results: results.md
      - Scans and export: scans.md
      - Plotting: plotting.md
  - Reference:
      - Equations and units: equations.md
      - API: api.md
      - Limitations: limitations.md
  - Ecosystem comparison: comparison.md
  - Development: development.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

strict: true
